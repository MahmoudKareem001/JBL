{id:uid(),name:'فستق صغير',cat:'مكسرات',barcode:'625100100064',buy:0.65,sell:1.00,qty:60,branch:'الفرع الرئيسي',min:10,emoji:'🥜'}
],
branches:[{id:uid(),name:'الفرع الرئيسي',manager:'محمود',phone:'0790000000'}],
customers:[{id:uid(),name:'زبون نقدي',phone:'-',debt:0},{id:uid(),name:'أحمد محمد',phone:'0791111111',debt:3.5}],
suppliers:[{id:uid(),name:'مورد المشروبات',phone:'0782222222'},{id:uid(),name:'مورد السناكات',phone:'0783333333'}],
invoices:[],returns:[],debts:[{id:uid(),customer:'أحمد محمد',amount:3.5,paid:1,remain:2.5,date:today(),note:'دين سابق'}],
activities:[{date:now(),text:'تم إنشاء بيانات تجريبية للنظام'}],
settings:{tax:0,storeName:'JBL Market',currency:'JOD'}, simulatedCustomers:0
}}
function uid(){return 'id'+Math.random().toString(36).slice(2,10)+Date.now().toString(36)}
function today(){return new Date().toISOString().slice(0,10)}function now(){return new Date().toLocaleString('ar-JO')}
function load(){db=JSON.parse(localStorage.getItem('jbl_db')||'null')||defaults();if(db.simulatedCustomers===undefined)db.simulatedCustomers=0;const base=defaults().products;for(const p of base){if(!db.products.some(x=>x.barcode===p.barcode))db.products.push(p)}save()}
function save(){localStorage.setItem('jbl_db',JSON.stringify(db))}
function money(n){return Number(n||0).toFixed(2)+' JOD'}
function tr(k){return T[lang][k]||k}
function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2300)}
function login(){let u=loginUser.value,p=loginPass.value,r=loginRole.value;if(u===LOGIN_USER&&p===LOGIN_PASS){currentUser={name:u,role:r};localStorage.setItem('jbl_session',JSON.stringify(currentUser));start()}else toast('بيانات الدخول غلط')}
function logout(){localStorage.removeItem('jbl_session');location.reload()}
function start(){load();document.body.classList.toggle('light',theme==='light');loginScreen.classList.add('hidden');app.classList.remove('hidden');renderNav();go('dashboard');tick();setInterval(tick,1000);setInterval(simulateCustomers,60000);userRoleText.textContent=currentUser.role}
function renderNav(){nav.innerHTML=pages.map(p=>`<button id="nav_${p[0]}" onclick="go('${p[0]}')">${p[1]} <span>${tr(p[0])}</span></button>`).join('')}
function go(page){document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));let n=document.getElementById('nav_'+page);if(n)n.classList.add('active');pageTitle.textContent=tr(page);window['render_'+page]()}
function tick(){clock.textContent=new Date().toLocaleString(lang==='ar'?'ar-JO':'en-US')}
function toggleTheme(){theme=theme==='dark'?'light':'dark';localStorage.setItem('jbl_theme',theme);document.body.classList.toggle('light',theme==='light')}
function toggleLang(){lang=lang==='ar'?'en':'ar';localStorage.setItem('jbl_lang',lang);document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';renderNav();go(document.querySelector('.nav button.active')?.id.replace('nav_','')||'dashboard')}
function can(action){if(currentUser.role==='admin')return true;if(currentUser.role==='cashier')return ['pos','invoice','return'].includes(action);return false}
function deny(){toast('لا تملك صلاحية لهذه العملية')}
function stat(){let stockValue=db.products.reduce((s,p)=>s+p.buy*p.qty,0),debt=db.debts.reduce((s,d)=>s+d.remain,0),sales=db.invoices.reduce((s,i)=>s+i.total,0),profit=db.invoices.reduce((s,i)=>s+i.profit,0);return{stockValue,debt,sales,profit}}
function simulateCustomers(){
  db.simulatedCustomers=(db.simulatedCustomers||0)+20;
  const names=['محمد','أحمد','عمر','خالد','سارة','لين','نور','يزن','لانا','رامي'];
  for(let i=0;i<20;i++){
    const p=db.products[Math.floor(Math.random()*db.products.length)];
    if(!p||p.qty<=0) continue;
    const qty=Math.min(p.qty,Math.floor(Math.random()*2)+1);
    p.qty-=qty;
    const total=p.sell*qty, profit=(p.sell-p.buy)*qty;
    db.invoices.push({id:uid(),no:db.invoices.length+1,date:now(),items:[{id:p.id,name:p.name,price:p.sell,buy:p.buy,qty}],total,profit,customer:names[Math.floor(Math.random()*names.length)]+' تلقائي',type:'cash',auto:true});
  }
  db.activities.push({date:now(),text:'دخول 20 زبون تلقائي وتسجيل مبيعات عشوائية'});
  save();
  if(!document.getElementById('app').classList.contains('hidden')){
    let active=document.querySelector('.nav button.active')?.id.replace('nav_','')||'dashboard';
    if(['dashboard','products','invoices','reports'].includes(active)) go(active);
  }
}

function render_dashboard(){let s=stat();content.innerHTML=`<div class="cards">
<div class="card"><span class="muted">إجمالي المنتجات</span><div class="num">${db.products.length}</div></div>
<div class="card"><span class="muted">قيمة المخزون</span><div class="num">${money(s.stockValue)}</div></div>
<div class="card"><span class="muted">مبيعات النظام</span><div class="num">${money(s.sales)}</div></div>
<div class="card"><span class="muted">إجمالي الديون</span><div class="num">${money(s.debt)}</div></div>
<div class="card"><span class="muted">زبائن تلقائيين اليوم</span><div class="num">${db.simulatedCustomers||0}</div></div>
</div><div class="grid2"><div class="section"><h3>أحدث العمليات</h3>${db.activities.slice(-8).reverse().map(a=>`<p>🟧 ${a.date} - ${a.text}</p>`).join('')}</div><div class="section"><h3>حركة الزبائن</h3><p>🔥 النظام يضيف 20 زبون تلقائياً كل دقيقة</p><p>آخر تحديث: ${now()}</p><button class="btn primary" onclick="simulateCustomers()">إضافة 20 زبون الآن</button></div></div><div class="section"><h3>منتجات قليلة</h3>${db.products.filter(p=>p.qty<=p.min).map(p=>`<p>⚠️ ${p.name} - ${p.qty}</p>`).join('')||'لا يوجد'}</div>`}
function render_products(){content.innerHTML=`<div class="section"><h3>إضافة منتج</h3><div class="form">
<input id="pn" placeholder="اسم المنتج"><input id="pc" placeholder="التصنيف"><input id="pb" placeholder="الباركود">
<input id="pe" placeholder="رمز/إيموجي" value="📦"><input id="pbuy" type="number" step=".01" placeholder="سعر الشراء"><input id="psell" type="number" step=".01" placeholder="سعر البيع"><input id="pqty" type="number" placeholder="الكمية"><input id="pmin" type="number" placeholder="حد التنبيه"><select id="pbr">${db.branches.map(b=>`<option>${b.name}</option>`).join('')}</select>
<button class="btn primary" onclick="addProduct()">إضافة</button></div></div><div class="section"><input id="searchP" oninput="drawProducts()" placeholder="بحث بالاسم أو الباركود"><br><br><div class="table-wrap"><table><thead><tr><th>المنتج</th><th>التصنيف</th><th>باركود</th><th>شراء</th><th>بيع</th><th>كمية</th><th>فرع</th><th>حالة</th><th>إجراء</th></tr></thead><tbody id="productsRows"></tbody></table></div></div>`;drawProducts()}
function drawProducts(){let q=(searchP?.value||'').toLowerCase();productsRows.innerHTML=db.products.filter(p=>(p.name+p.barcode+p.cat).toLowerCase().includes(q)).map(p=>`<tr><td>${p.emoji} ${p.name}</td><td>${p.cat}</td><td>${p.barcode}</td><td>${money(p.buy)}</td><td>${money(p.sell)}</td><td>${p.qty}</td><td>${p.branch}</td><td><span class="badge ${p.qty<=p.min?'danger':'ok'}">${p.qty<=p.min?'ناقص':'متوفر'}</span></td><td><button class="btn" onclick="editProduct('${p.id}')">تعديل</button> <button class="btn danger" onclick="delProduct('${p.id}')">حذف</button></td></tr>`).join('')}
function addProduct(){if(!can('admin'))return deny();db.products.push({id:uid(),name:pn.value,cat:pc.value,barcode:pb.value||Date.now(),emoji:pe.value||'📦',buy:+pbuy.value||0,sell:+psell.value||0,qty:+pqty.value||0,min:+pmin.value||5,branch:pbr.value});db.activities.push({date:now(),text:'إضافة منتج '+pn.value});save();render_products();toast('تمت إضافة المنتج')}
function delProduct(id){if(!can('admin'))return deny();db.products=db.products.filter(p=>p.id!==id);save();render_products()}
function editProduct(id){if(!can('admin'))return deny();let p=db.products.find(x=>x.id===id);modal.innerHTML=`<div class="modal-box"><h3>تعديل ${p.name}</h3><div class="form"><input id="epn" value="${p.name}"><input id="epc" value="${p.cat}"><input id="epb" value="${p.barcode}"><input id="epbuy" type="number" value="${p.buy}"><input id="epsell" type="number" value="${p.sell}"><input id="epqty" type="number" value="${p.qty}"><input id="epmin" type="number" value="${p.min}"></div><br><button class="btn primary" onclick="saveEditProduct('${id}')">حفظ</button> <button class="btn" onclick="closeModal()">إغلاق</button></div>`;modal.classList.remove('hidden')}
function saveEditProduct(id){let p=db.products.find(x=>x.id===id);Object.assign(p,{name:epn.value,cat:epc.value,barcode:epb.value,buy:+epbuy.value,sell:+epsell.value,qty:+epqty.value,min:+epmin.value});save();closeModal();render_products();toast('تم التعديل')}
function closeModal(){modal.classList.add('hidden');modal.innerHTML=''}
let cart=[];
function render_pos(){content.innerHTML=`<div class="pos"><div class="section"><input id="posSearch" oninput="drawPosProducts()" placeholder="بحث أو مسح باركود"><br><br><div class="products-grid" id="posProducts"></div></div><div class="section"><h3>السلة</h3><div id="cartRows"></div><hr><select id="payType"><option value="cash">نقدي</option><option value="debt">دين</option></select><select id="cartCustomer">${db.customers.map(c=>`<option>${c.name}</option>`).join('')}</select><input id="paid" type="number" step=".01" placeholder="المدفوع"><h2 id="cartTotal">0 JOD</h2><button class="btn primary" onclick="checkout()">إصدار فاتورة</button></div></div>`;drawPosProducts();drawCart()}
function drawPosProducts(){let q=(posSearch?.value||'').toLowerCase();posProducts.innerHTML=db.products.filter(p=>(p.name+p.barcode).toLowerCase().includes(q)).map(p=>`<div class="product-tile" onclick="addCart('${p.id}')"><div class="emoji">${p.emoji}</div><b>${p.name}</b><br><span class="muted">${money(p.sell)}</span><br><small>المتوفر ${p.qty}</small></div>`).join('')}
function addCart(id){let p=db.products.find(x=>x.id===id);if(!p||p.qty<=0)return toast('الكمية غير متوفرة');let c=cart.find(x=>x.id===id);c?c.qty++:cart.push({id:p.id,name:p.name,price:p.sell,buy:p.buy,qty:1});drawCart()}
function drawCart(){let total=cart.reduce((s,i)=>s+i.price*i.qty,0);if(cartRows)cartRows.innerHTML=cart.map(i=>`<div class="cart-row"><span>${i.name} × ${i.qty}</span><span>${money(i.price*i.qty)} <button onclick="cart=cart.filter(x=>x.id!=='${i.id}');drawCart()">✕</button></span></div>`).join('');if(cartTotal)cartTotal.textContent=money(total)}
function checkout(){if(!can('pos'))return deny();if(!cart.length)return toast('السلة فارغة');let total=cart.reduce((s,i)=>s+i.price*i.qty,0),profit=cart.reduce((s,i)=>(s+(i.price-i.buy)*i.qty),0);for(let i of cart){let p=db.products.find(x=>x.id===i.id);p.qty-=i.qty}let inv={id:uid(),no:db.invoices.length+1,date:now(),items:[...cart],total,profit,customer:cartCustomer.value,type:payType.value};db.invoices.push(inv);if(payType.value==='debt'){let paidAmt=+paid.value||0;db.debts.push({id:uid(),customer:cartCustomer.value,amount:total,paid:paidAmt,remain:total-paidAmt,date:today(),note:'فاتورة رقم '+inv.no})}db.activities.push({date:now(),text:'إصدار فاتورة رقم '+inv.no});cart=[];save();render_pos();printInvoice(inv);toast('تم إصدار الفاتورة')}
function printInvoice(inv){modal.innerHTML=`<div class="modal-box printable"><div class="print-area"><h2>JBL Market</h2><p>فاتورة رقم ${inv.no}</p><p>${inv.date}</p><hr>${inv.items.map(i=>`<p>${i.name} × ${i.qty} = ${money(i.qty*i.price)}</p>`).join('')}<hr><h3>الإجمالي ${money(inv.total)}</h3></div><br><button class="btn primary" onclick="window.print()">طباعة</button> <button class="btn" onclick="closeModal()">إغلاق</button></div>`;modal.classList.remove('hidden')}
function render_invoices(){content.innerHTML=`<div class="section"><div class="table-wrap"><table><thead><tr><th>رقم</th><th>تاريخ</th><th>زبون</th><th>طريقة</th><th>الإجمالي</th><th>إجراء</th></tr></thead><tbody>${db.invoices.map(i=>`<tr><td>${i.no}</td><td>${i.date}</td><td>${i.customer}</td><td>${i.type}</td><td>${money(i.total)}</td><td><button class="btn" onclick='printInvoice(${JSON.stringify(i)})'>عرض/طباعة</button></td></tr>`).join('')}</tbody></table></div></div>`}
function simpleCrud(title,key,fields){content.innerHTML=`<div class="section"><h3>${title}</h3><div class="form">${fields.map(f=>`<input id="f_${f}" placeholder="${f}">`).join('')}<button class="btn primary" onclick="addSimple('${key}','${fields.join(',')}')">إضافة</button></div></div><div class="section"><table><tbody>${db[key].map(x=>`<tr>${fields.map(f=>`<td>${x[f]||''}</td>`).join('')}<td><button class="btn danger" onclick="delSimple('${key}','${x.id}')">حذف</button></td></tr>`).join('')}</tbody></table></div>`}
function addSimple(key,fs){if(!can('admin'))return deny();let o={id:uid()};fs.split(',').forEach(f=>o[f]=document.getElementById('f_'+f).value);db[key].push(o);save();window['render_'+key]()}
function delSimple(key,id){if(!can('admin'))return deny();db[key]=db[key].filter(x=>x.id!==id);save();window['render_'+key]()}
function render_customers(){simpleCrud('العملاء','customers',['name','phone','debt'])}
function render_suppliers(){simpleCrud('الموردين','suppliers',['name','phone'])}
function render_branches(){simpleCrud('الفروع','branches',['name','manager','phone'])}
function render_debts(){content.innerHTML=`<div class="section"><h3>الديون</h3><div class="table-wrap"><table><thead><tr><th>العميل</th><th>الدين</th><th>مدفوع</th><th>متبقي</th><th>التاريخ</th><th>دفع</th></tr></thead><tbody>${db.debts.map(d=>`<tr><td>${d.customer}</td><td>${money(d.amount)}</td><td>${money(d.paid)}</td><td>${money(d.remain)}</td><td>${d.date}</td><td><button class="btn ok" onclick="payDebt('${d.id}')">تسديد</button></td></tr>`).join('')}</tbody></table></div></div>`}
function payDebt(id){let d=db.debts.find(x=>x.id===id),v=prompt('كم المبلغ؟');v=+v||0;d.paid+=v;d.remain=Math.max(0,d.remain-v);save();render_debts()}
function render_returns(){content.innerHTML=`<div class="section"><h3>مرتجع فاتورة</h3><input id="retNo" placeholder="رقم الفاتورة"><button class="btn warn" onclick="doReturn()">تنفيذ مرتجع كامل</button></div><div class="section">${db.returns.map(r=>`<p>↩️ فاتورة ${r.no} - ${money(r.total)} - ${r.date}</p>`).join('')||'لا يوجد مرتجعات'}</div>`}
function doReturn(){if(!can('return'))return deny();let inv=db.invoices.find(i=>i.no==retNo.value);if(!inv)return toast('الفاتورة غير موجودة');inv.items.forEach(i=>{let p=db.products.find(x=>x.id===i.id);if(p)p.qty+=i.qty});db.returns.push({id:uid(),no:inv.no,total:inv.total,date:now()});db.activities.push({date:now(),text:'مرتجع فاتورة رقم '+inv.no});save();render_returns();toast('تم المرتجع')}
function render_reports(){let s=stat();content.innerHTML=`<div class="cards"><div class="card"><span class="muted">المبيعات</span><div class="num">${money(s.sales)}</div></div><div class="card"><span class="muted">الأرباح</span><div class="num">${money(s.profit)}</div></div><div class="card"><span class="muted">قيمة المخزون</span><div class="num">${money(s.stockValue)}</div></div><div class="card"><span class="muted">ديون</span><div class="num">${money(s.debt)}</div></div></div><div class="section"><h3>أفضل المنتجات</h3>${db.products.map(p=>`<p>${p.emoji} ${p.name} — الكمية الحالية ${p.qty}</p>`).join('')}</div>`}
function render_barcode(){content.innerHTML=`<div class="section"><h3>طباعة باركود المنتجات</h3><div class="grid3">${db.products.map(p=>`<div class="card printable"><h3>${p.name}</h3><div style="font-family:monospace;font-size:28px;letter-spacing:2px">||||||||||</div><b>${p.barcode}</b><p>${money(p.sell)}</p></div>`).join('')}</div><br><button class="btn primary" onclick="window.print()">طباعة</button></div>`}
function render_settings(){content.innerHTML=`<div class="section"><h3>الإعدادات والصلاحيات</h3><p>المستخدم الأساسي: mahmoud</p><p>كلمة المرور: mahmoud@2005</p><p>الصلاحيات: مدير / كاشير / مشاهد</p><button class="btn danger" onclick="if(confirm('حذف كل البيانات؟')){localStorage.removeItem('jbl_db');load();go('dashboard')}">إعادة ضبط البيانات</button></div>`}
function backup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='jbl-backup.json';a.click()}
if(currentUser)start(); else {document.body.classList.toggle('light',theme==='light')}
</script>
